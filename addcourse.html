<!DOCTYPE html>
<html>
    <head>
        <title>Addcourse</title>
        <meta charset="_UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="home.css">
    </head>
    <body>
         <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My courses</a></li>
                <li><a href="addcourse.html">Add course</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
         </nav>  
        <header>
            <h1>ADD Curse</h1>
        </header>
        <br>
        <br>
        <main>
            <section>
                <form>
                    <label for="n">Course name</label>
                    <input id="n" type="text" placeholder="course name">
                    <br>
                    <br>
                    <label for="m">Instructor</label>
                    <input id="m" type="text" placeholder="Instructor">
                    <br>
                    <br>
                    <label for="s">Credit hours</label>
                    <input id="s" type="number" placeholder="Credit hours" min="0">
                    <br>
                    <br>
                    <label>Notes</label>
                    <textarea cols="50" rows="10" placeholder="Notes"></textarea>
                    <br>
                    <br>
                    <button>Submit</button>
                    <button>Reset</button>
                </form>
            </section>
        </main>
        <footer>
            <p>choose a course from the currently available courses and submit it.</p>
        </footer>
    </body>
</html>
